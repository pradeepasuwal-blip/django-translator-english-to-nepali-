<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Translator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            width: 450px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            border: 1px solid #601616;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            font-size: 16px;
            color: #444;
            text-align: left;
        }
        .result strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 English → Nepali Translator</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="translate" placeholder="Enter English text">
            <br>
            <button type="submit">Translate</button>
        </form>

        {% if translation %}
        <div class="result">
            <strong>Original English:</strong>
            <p>{{ request.POST.translate }}</p>

            <strong>Nepali Translation:</strong>
            <p>{{ translation }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
